<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 124 124" fill="none">

  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6E1000"/>
      <stop offset="50%" stop-color="#470B00"/>
      <stop offset="100%" stop-color="#A11F00"/>
    </linearGradient>

    <linearGradient id="lightRedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC2B8"/>
      <stop offset="50%" stop-color="#FF4D2E"/>
      <stop offset="100%" stop-color="#FF9B8A"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur" rx="12"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- black squircle outside -->
  <rect width="124" height="124" rx="12" fill="url(#redGradient)" />

  <!-- some laptop svg i found online -->
  <path
    xmlns="http://www.w3.org/2000/svg"
    d="M.5 22c-.276 0-.5.224-.5.5C0 24.386 1.293 26 3 26h24c1.707 0 3-1.614 3-3.5 0-.276-.224-.5-.5-.5zm.668 1h27.664c-.212 1.135-.918 2-1.832 2H3c-.914 0-1.62-.865-1.832-2zM5.5 6C4.678 6 4 6.678 4 7.5v13c0 .276.224.5.5.5h21c.276 0 .5-.224.5-.5v-13c0-.822-.678-1.5-1.5-1.5zm0 1h19c.286 0 .5.214.5.5V20H5V7.5c0-.286.214-.5.5-.5zm-1-3C3.124 4 2 5.124 2 6.5v14c-.01.676 1.01.676 1 0v-14C3 5.66 3.66 5 4.5 5h21c.84 0 1.5.66 1.5 1.5v14c-.01.676 1.01.676 1 0v-14C28 5.124 26.876 4 25.5 4z"
    fill="url(#lightRedGradient)"
    transform="scale(2.5), translate(9, 4)"

    x="50%"
    y="50%"
  />

  <!--- uukelele text -->
  <text
    x="50%"
    y="80%"
    fill="url(#lightRedGradient)"
    font-size="18"
    dominant-baseline="middle"
    text-anchor="middle"
    font-family="figtree, Arial, system-ui"
    filter="url(#glow)"
  >uukelele</text>
  
</svg>
